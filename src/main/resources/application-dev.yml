spring:
  application:
    name: Omni-BE-Payment

cors:
  urls:
    httpsGatewayURL: ${HTTPS_GATEWAY_URL}

springdoc:
  api-docs:
    path: ${PAYMENT_SWAGGER_PATH}
  swagger-ui:
    path: ${PAYMENT_SWAGGER_PATH}

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      percentiles-histogram:
        http.server.requests: true